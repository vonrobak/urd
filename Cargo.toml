[package]
name = "urd"
version = "0.1.0"
edition = "2024"
description = "BTRFS Time Machine for Linux"
license = "MIT"
repository = "https://github.com/vonrobak/urd"

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Serialization & config
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# System
nix = { version = "0.29", features = ["fs"] }
dirs = "6"
ctrlc = "3"

# Output formatting
colored = "2"
# Logging
log = "0.4"
env_logger = "0.11"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
strip = true
